<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 300" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-label="Comparison: admin sees all areas, restricted ground-floor user sees only the ground floor">
  <rect width="728" height="300" rx="10" fill="#111318"/>

  <!-- LEFT: admin -->
  <rect x="12" y="12" width="340" height="276" rx="12" fill="#1f2229" stroke="#34383f"/>
  <text x="30" y="40" fill="#e3e5e8" font-size="14" font-weight="600">Admin</text>
  <text x="30" y="58" fill="#9aa0a6" font-size="11">Bypass — sees all areas</text>
  <g>
    <rect x="30" y="72" width="146" height="46" rx="8" fill="#22303a" stroke="#03a9f4"/><text x="42" y="92" fill="#e3e5e8" font-size="12">Living room</text><text x="42" y="108" fill="#4caf50" font-size="10">GF · on</text>
    <rect x="188" y="72" width="146" height="46" rx="8" fill="#22303a" stroke="#03a9f4"/><text x="200" y="92" fill="#e3e5e8" font-size="12">Bathroom</text><text x="200" y="108" fill="#4caf50" font-size="10">GF · on</text>
    <rect x="30" y="126" width="146" height="46" rx="8" fill="#22303a" stroke="#03a9f4"/><text x="42" y="146" fill="#e3e5e8" font-size="12">Cellar</text><text x="42" y="162" fill="#9aa0a6" font-size="10">Basement · off</text>
    <rect x="188" y="126" width="146" height="46" rx="8" fill="#22303a" stroke="#03a9f4"/><text x="200" y="146" fill="#e3e5e8" font-size="12">Laundry</text><text x="200" y="162" fill="#9aa0a6" font-size="10">Basement · off</text>
    <rect x="30" y="180" width="146" height="46" rx="8" fill="#22303a" stroke="#03a9f4"/><text x="42" y="200" fill="#e3e5e8" font-size="12">Bedroom</text><text x="42" y="216" fill="#9aa0a6" font-size="10">Upper · off</text>
    <rect x="188" y="180" width="146" height="46" rx="8" fill="#22303a" stroke="#03a9f4"/><text x="200" y="200" fill="#e3e5e8" font-size="12">Dressing</text><text x="200" y="216" fill="#9aa0a6" font-size="10">Upper · off</text>
  </g>
  <text x="30" y="256" fill="#7d838a" font-size="10">6 areas across 3 floors</text>

  <text x="360" y="156" fill="#03a9f4" font-size="22" text-anchor="middle">→</text>

  <!-- RIGHT: restricted -->
  <rect x="376" y="12" width="340" height="276" rx="12" fill="#1f2229" stroke="#34383f"/>
  <text x="394" y="40" fill="#e3e5e8" font-size="14" font-weight="600">ground_user</text>
  <text x="394" y="58" fill="#9aa0a6" font-size="11">restricted — ground floor only</text>
  <g>
    <rect x="394" y="72" width="146" height="46" rx="8" fill="#22303a" stroke="#4caf50"/><text x="406" y="92" fill="#e3e5e8" font-size="12">Living room</text><text x="406" y="108" fill="#4caf50" font-size="10">GF · on</text>
    <rect x="552" y="72" width="146" height="46" rx="8" fill="#22303a" stroke="#4caf50"/><text x="564" y="92" fill="#e3e5e8" font-size="12">Bathroom</text><text x="564" y="108" fill="#4caf50" font-size="10">GF · on</text>
    <rect x="394" y="126" width="146" height="46" rx="8" fill="#15181d" stroke="#2b2f36" stroke-dasharray="4 4"/><text x="467" y="153" fill="#6b7178" font-size="10" text-anchor="middle">hidden</text>
    <rect x="552" y="126" width="146" height="46" rx="8" fill="#15181d" stroke="#2b2f36" stroke-dasharray="4 4"/><text x="625" y="153" fill="#6b7178" font-size="10" text-anchor="middle">hidden</text>
    <rect x="394" y="180" width="146" height="46" rx="8" fill="#15181d" stroke="#2b2f36" stroke-dasharray="4 4"/><text x="467" y="207" fill="#6b7178" font-size="10" text-anchor="middle">hidden</text>
    <rect x="552" y="180" width="146" height="46" rx="8" fill="#15181d" stroke="#2b2f36" stroke-dasharray="4 4"/><text x="625" y="207" fill="#6b7178" font-size="10" text-anchor="middle">hidden</text>
  </g>
  <text x="394" y="256" fill="#7d838a" font-size="10">only permitted areas · basement/upper dropped</text>
</svg>
