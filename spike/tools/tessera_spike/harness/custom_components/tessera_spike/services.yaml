ensure_group:
  name: Ensure group
  description: Create or update one dev-only auth group with an entity policy.
  fields:
    group_id:
      required: true
      selector:
        text:
    name:
      required: true
      selector:
        text:
    entity_id:
      required: true
      selector:
        entity:
    read:
      required: false
      default: true
      selector:
        boolean:
    control:
      required: false
      default: false
      selector:
        boolean:

set_group_policy:
  name: Set group policy
  description: Replace one dev-only group policy with an entity policy.
  fields:
    group_id:
      required: true
      selector:
        text:
    entity_id:
      required: true
      selector:
        entity:
    read:
      required: false
      default: true
      selector:
        boolean:
    control:
      required: false
      default: false
      selector:
        boolean:

set_user_groups:
  name: Set user groups
  description: Set a dev-only user's full group union.
  fields:
    user_name:
      required: true
      selector:
        text:
    group_ids:
      required: true
      selector:
        object:

flush_auth_store:
  name: Flush auth store
  description: Persist Home Assistant's auth store to disk.

invalidate_user:
  name: Invalidate user permissions
  description: Invalidate the cached permissions of a dev-only user.
  fields:
    user_name:
      required: true
      selector:
        text:

snapshot:
  name: Snapshot auth
  description: Return a sanitized auth snapshot without token values.

restore:
  name: Restore user groups
  description: Restore one dev-only user's full group union; this is not a full auth snapshot restore.
  fields:
    user_name:
      required: true
      selector:
        text:
    group_ids:
      required: true
      selector:
        object:

probe_check_entity:
  name: Probe check entity
  description: Probe native check_entity for a dev-only user.
  fields:
    user_name:
      required: true
      selector:
        text:
    entity_id:
      required: true
      selector:
        entity:
    permission:
      required: false
      default: read
      selector:
        select:
          options:
            - read
            - control

run_spike:
  name: Run legacy spike phase
  description: Run the existing D1-D9 pre_restart or post_restart orchestration.
  fields:
    phase:
      required: true
      selector:
        select:
          options:
            - pre_restart
            - post_restart
