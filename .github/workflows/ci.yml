name: CI

on:
  push:
    branches: [main, "core/**", "welle-**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install tools
        run: pip install ruff black mypy pytest pytest-asyncio pytest-homeassistant-custom-component
      - name: ruff (lint)
        run: ruff check .
      - name: black (format check)
        run: black --check .
      - name: mypy (types, strict)
        run: mypy custom_components/tessera
      - name: pytest
        # exit code 5 = "no tests collected" (ok solange noch keine Tests existieren)
        run: pytest -q || [ $? -eq 5 ]
      - name: stale-marker check (docs/QUALITY.md R4)
        # Verdrahteter Code darf sich nicht "dormant/not wired" nennen
        # (by-design `v1-inert`/`by_group` ist nicht betroffen).
        run: |
          if grep -rniE 'dormant|not wired|not yet wired|deliberately dormant' \
              --include='*.py' custom_components/tessera/; then
            echo "::error::Verdrahteter Code nennt sich dormant/not-wired — Docstring aktualisieren (docs/QUALITY.md R4)."
            exit 1
          fi
