name: Validate

# HACS- und hassfest-Validierung. Ergaenzt (ersetzt nicht) ci.yml (Lint/Typ/Test).
# Der HACS-Job gatet jetzt ECHT (kein 'continue-on-error' mehr) und setzt ein
# OEFFENTLICHES Repo voraus: hacs/action liest hacs.json/manifest ueber GitHub, was am
# privaten Repo fehlschlaegt. Dieser Workflow-Stand gehoert damit zum Public-Flip —
# vorher erwartet der HACS-Job rot. 'brands' wird ohne 'ignore' geprueft und ueber das
# Inline-Verzeichnis custom_components/tessera/brand/icon.png erfuellt (vom hacs/default-PR
# gefordert: HACS-Action ohne 'ignore'-Key gruen).

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          comment: "false"

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
