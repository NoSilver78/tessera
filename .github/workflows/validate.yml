name: Validate

# HACS- und hassfest-Validierung. Ergaenzt (ersetzt nicht) ci.yml (Lint/Typ/Test).
# Der HACS-Job gatet jetzt ECHT (kein 'continue-on-error' mehr) und setzt ein
# OEFFENTLICHES Repo voraus: hacs/action liest hacs.json/manifest ueber GitHub, was am
# privaten Repo fehlschlaegt. Dieser Workflow-Stand gehoert damit zum Public-Flip —
# vorher erwartet der HACS-Job rot. 'brands' bleibt ignoriert, bis 'tessera' in
# home-assistant/brands eingetragen ist (Inline custom_components/tessera/brand/ deckt
# HAs Icon-Rendering).

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          comment: "false"
          # 'brands' ignorieren, bis 'tessera' in home-assistant/brands eingetragen ist
          # (Inline custom_components/tessera/brand/ deckt nur HAs Icon-Rendering).
          ignore: brands

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
