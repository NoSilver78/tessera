name: Validate

# HACS- und hassfest-Validierung. Ergaenzt (ersetzt nicht) ci.yml (Lint/Typ/Test).
# Stand: hassfest + quality (ci.yml) sind gruen. Der HACS-Job ist bis zum Public-Flip
# 'continue-on-error': empirisch bestaetigt liest die hacs/action die Datei-Inhalte
# (hacs.json/manifest) unauthentifiziert — das scheitert am PRIVATEN Repo, auch mit
# hacs.json auf 'main'. Er wird automatisch gruen, sobald das Repo OEFFENTLICH ist;
# dann 'continue-on-error' entfernen. 'brands' bleibt ignoriert, bis 'tessera' in
# home-assistant/brands eingetragen ist.

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    # Erwartet rot bis Repo public: hacs/action liest hacs.json/manifest
    # unauthentifiziert (raw), was am privaten Repo fehlschlaegt. Beim Public-Flip
    # diese Zeile entfernen, damit HACS wieder echt gatet.
    continue-on-error: true
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          comment: "false"
          # 'brands' ignorieren, bis 'tessera' in home-assistant/brands eingetragen ist
          # (Inline custom_components/tessera/brand/ deckt nur HAs Icon-Rendering).
          ignore: brands

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
