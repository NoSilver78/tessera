name: Validate

# HACS- und hassfest-Validierung. Ergaenzt (ersetzt nicht) ci.yml (Lint/Typ/Test).
# Hinweis: vollstaendig gruen erst zum Release — erfordert ein OEFFENTLICHES Repo
# und einen 'tessera'-Eintrag in home-assistant/brands. Bis dahin schlaegt die
# Brand-Pruefung (besonders hassfest) erwartungsgemaess fehl; PR #27 ist bewusst gehalten.

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          comment: "false"
          # 'brands' ignorieren, bis 'tessera' in home-assistant/brands eingetragen ist
          # (Inline custom_components/tessera/brand/ deckt nur HAs Icon-Rendering).
          ignore: brands

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
