# Tessera service definitions. Human-readable names and descriptions live in
# strings.json (and translations/) under "services". The recompile service
# takes no fields: it recompiles every loaded entry for its current mode — a
# read-only preview in off/monitor, and a native re-apply (auth-store writes)
# in enforce.
recompile:
acknowledge_component:
  fields:
    domain:
      required: true
      selector:
        text:
revoke_component_ack:
  fields:
    domain:
      required: true
      selector:
        text:
set_membership:
  fields:
    user_id:
      required: true
      selector:
        text:
    role_ids:
      required: true
      selector:
        object:
set_floor_grant:
  fields:
    floor_id:
      required: true
      selector:
        text:
    role_id:
      required: true
      selector:
        text:
    read:
      required: true
      selector:
        boolean:
    control:
      required: true
      selector:
        boolean:
